<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mini ERP Simulator</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #2c3e50;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background-color: #34495e;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        input {
            width: 300px;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #27ae60;
        }

        .message {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }

        .incident-open {
            color: red;
            font-weight: bold;
        }

        .severity-p1 {
            color: red;
            font-weight: bold;
        }

        .severity-p2 {
            color: orange;
            font-weight: bold;
        }

        .severity-p3 {
            color: blue;
            font-weight: bold;
        }

    </style>

</head>

<body>

<h1>Mini ERP Simulator</h1>

<div class="section">

    <h2>Product Inventory</h2>

    <table>

        <tr>
            <th>SKU</th>
            <th>Product Name</th>
            <th>Inventory Qty</th>
        </tr>

        <tr th:each="product : ${products}">
            <td th:text="${product.sku}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.inventoryQty}"></td>
        </tr>

    </table>

</div>

<div class="section">

    <h2>Create Sales Order</h2>

    <form th:action="@{/web/orders}"
          th:object="${orderRequest}"
          method="post">

        <input type="text"
               th:field="*{orderId}"
               placeholder="Order ID"
               required>

        <br>

        <input type="text"
               th:field="*{customerName}"
               placeholder="Customer Name"
               required>

        <br>

        <input type="text"
               th:field="*{sku}"
               placeholder="SKU"
               required>

        <br>

        <input type="number"
               th:field="*{qty}"
               placeholder="Quantity"
               required>

        <br>

        <button type="submit">
            Create Order
        </button>

    </form>

    <div class="message"
         th:if="${message}"
         th:text="${message}">
    </div>

</div>

<div class="section">

    <h2>Incident Tickets</h2>

    <table>

        <tr>
            <th>Incident ID</th>
            <th>Transaction ID</th>
            <th>Error Type</th>
            <th>Severity</th>
            <th>Status</th>
            <th>Assigned Group</th>
            <th>Description</th>
            <th>Created</th>
        </tr>

        <tr th:each="incident : ${incidents}">

            <td th:text="${incident.incidentId}"></td>

            <td th:text="${incident.transactionId}"></td>

            <td th:text="${incident.errorType}"></td>

            <td>
                <span th:text="${incident.severity}"
                      th:classappend="
                        ${incident.severity == 'P1'} ? 'severity-p1' :
                        (${incident.severity == 'P2'} ? 'severity-p2' :
                        'severity-p3')">
                </span>
            </td>

            <td>
                <span th:text="${incident.status}"
                      th:classappend="
                        ${incident.status == 'OPEN'} ?
                        'incident-open' : ''">
                </span>
            </td>

            <td th:text="${incident.assignedGroup}"></td>

            <td th:text="${incident.description}"></td>

            <td th:text="${incident.createdAt}"></td>

        </tr>

    </table>

</div>

</body>
</html>
