<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mini ERP Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            color: #333;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        table {
            border-collapse: collapse;
            width: 600px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        input {
            display: block;
            margin: 8px 0;
            padding: 8px;
            width: 300px;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
        }

        .message {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h1>Mini ERP Simulator</h1>

<div class="section">
    <h2>Product Inventory</h2>

    <table>
        <tr>
            <th>SKU</th>
            <th>Name</th>
            <th>Inventory Qty</th>
        </tr>

        <tr th:each="product : ${products}">
            <td th:text="${product.sku}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.inventoryQty}"></td>
        </tr>
    </table>
</div>

<div class="section">
    <h2>Create Sales Order</h2>

    <form th:action="@{/web/orders}" th:object="${orderRequest}" method="post">
        <input type="text" th:field="*{orderId}" placeholder="Order ID e.g. SO-1002" required>
        <input type="text" th:field="*{customerName}" placeholder="Customer Name" required>
        <input type="text" th:field="*{sku}" placeholder="SKU e.g. LAPTOP-001" required>
        <input type="number" th:field="*{qty}" placeholder="Quantity" required>

        <button type="submit">Create Order</button>
    </form>

    <p class="message" th:if="${message}" th:text="${message}"></p>
</div>

</body>
</html>
