apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-erp-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-erp-simulator
  template:
    metadata:
      labels:
        app: mini-erp-simulator
    spec:
      containers:
        - name: mini-erp-simulator
          image: mini-erp-simulator:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://168.144.102.251:3306/mini_erp
            - name: SPRING_DATASOURCE_USERNAME
              value: erpuser
            - name: SPRING_DATASOURCE_PASSWORD
              value: erp123
---
apiVersion: v1
kind: Service
metadata:
  name: mini-erp-service
spec:
  type: NodePort
  selector:
    app: mini-erp-simulator
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30090